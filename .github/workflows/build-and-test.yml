###############################################################
#
# Intent: xnuimagefuzzer-build-and-test
#
# Build the XNU Image Fuzzer iOS app with xcodebuild and run
# basic smoke tests on the simulator. Security hardening modeled
# on iccDEV/.github/workflows/:
#   - Pinned action SHAs (immutable, auditable)
#   - Explicit least-privilege permissions
#   - Credential hardening
#   - BASH_ENV=/dev/null, hardened shell
#   - Concurrency control with cancel-in-progress
#   - persist-credentials: false on checkout
#   - No user-controllable inputs in run: blocks
#
###############################################################

name: xnuimagefuzzer-build-and-test

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

env:
  BASH_ENV: /dev/null
  SCHEME: "XNU Image Fuzzer"
  PROJECT: "XNU Image Fuzzer.xcodeproj"
  DESTINATION: "generic/platform=iOS Simulator"

defaults:
  run:
    shell: bash --noprofile --norc {0}

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - '**/*.plist'
      - '**/*.storyboard'
      - '**/*.pbxproj'
      - '**/*.xcscheme'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - '**/*.plist'
      - '**/*.storyboard'
      - '**/*.pbxproj'
      - '**/*.xcscheme'
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Show Xcode version
        run: |
          set -euo pipefail
          xcodebuild -version
          xcrun simctl list runtimes
          echo "---"
          xcodebuild -project "$PROJECT" -list 2>&1 || true

      - name: Build for iOS Simulator (Debug)
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            | tee /tmp/xcodebuild-debug.log \
            | tail -20
          echo "✅ Debug build succeeded"

      - name: Build for iOS Simulator (Release)
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            | tee /tmp/xcodebuild-release.log \
            | tail -20
          echo "✅ Release build succeeded"

      - name: Verify build artifacts
        run: |
          set -euo pipefail
          # Use -sdk iphonesimulator to get correct BUILT_PRODUCTS_DIR
          BUILD_DIR=$(xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -showBuildSettings \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>/dev/null | grep -m1 'BUILT_PRODUCTS_DIR' | awk '{print $3}')

          APP_PATH="$BUILD_DIR/XNU Image Fuzzer.app"
          if [ -d "$APP_PATH" ]; then
            echo "✅ App bundle exists: $APP_PATH"
            ls -la "$APP_PATH/"
            BINARY="$APP_PATH/XNU Image Fuzzer"
            if [ -f "$BINARY" ]; then
              file "$BINARY"
              echo "✅ Binary is valid"
            else
              echo "❌ Binary not found in app bundle"
              exit 1
            fi
          else
            echo "❌ App bundle not found at $APP_PATH"
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" -maxdepth 5 2>/dev/null | head -5
            exit 1
          fi

  analyze:
    name: Static Analysis (Clang)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Run Clang Static Analyzer
        run: |
          set -euo pipefail
          xcodebuild analyze \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            CLANG_ANALYZER_OUTPUT=text \
            CLANG_ANALYZER_OUTPUT_DIR=/tmp/analyzer-output \
            RUN_CLANG_STATIC_ANALYZER=YES \
            | tee /tmp/xcodebuild-analyze.log \
            | tail -30
          echo "✅ Static analysis completed"

      - name: Check for analyzer warnings
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          warnings=$(grep -c "warning:" /tmp/xcodebuild-analyze.log 2>/dev/null || echo "0")
          analyzer_warnings=$(grep -c "CLANG_ANALYZER" /tmp/xcodebuild-analyze.log 2>/dev/null || echo "0")
          echo "Compiler warnings: $(sanitize_line "$warnings")"
          echo "Analyzer findings: $(sanitize_line "$analyzer_warnings")"

          # Check for analyzer output files
          if [ -d /tmp/analyzer-output ]; then
            count=$(find /tmp/analyzer-output -name "*.plist" 2>/dev/null | wc -l)
            echo "Analyzer report files: $count"
            if [ "$count" -gt 0 ]; then
              echo "⚠️  Static analyzer found potential issues"
              find /tmp/analyzer-output -name "*.plist" -exec basename {} \; | head -10
            fi
          fi
          echo "✅ Analysis review complete"

  smoke-test:
    name: Simulator Smoke Test
    runs-on: macos-latest
    needs: build-ios
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Discover simulator
        id: sim
        run: |
          set -euo pipefail
          # Find the first available iPhone simulator
          SIM_INFO=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if d['isAvailable'] and 'iPhone' in d['name']:
                          print(d['udid'])
                          print(d['name'])
                          sys.exit(0)
          # No simulators found — list what IS available
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if d['isAvailable']:
                      print(d['udid'], file=sys.stderr)
                      print(d['name'], file=sys.stderr)
          sys.exit(1)
          ")
          SIM_UDID=$(echo "$SIM_INFO" | head -1)
          SIM_NAME=$(echo "$SIM_INFO" | tail -1)
          echo "sim_udid=$SIM_UDID" >> "$GITHUB_OUTPUT"
          echo "sim_name=$SIM_NAME" >> "$GITHUB_OUTPUT"
          echo "✅ Found simulator: $SIM_NAME ($SIM_UDID)"

      - name: Build for simulator
        run: |
          set -euo pipefail
          SIM_DEST="platform=iOS Simulator,id=${{ steps.sim.outputs.sim_udid }}"
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "$SIM_DEST" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            | tail -5
          echo "✅ Build for smoke test completed"

      - name: Install, launch and verify
        run: |
          set -euo pipefail
          SIM_UDID="${{ steps.sim.outputs.sim_udid }}"

          # Boot the simulator
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true
          echo "✅ Simulator booted"

          # Find the built app
          BUILD_DIR=$(xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -showBuildSettings \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>/dev/null | grep -m1 'BUILT_PRODUCTS_DIR' | awk '{print $3}')

          APP_PATH="$BUILD_DIR/XNU Image Fuzzer.app"
          if [ -d "$APP_PATH" ]; then
            xcrun simctl install "$SIM_UDID" "$APP_PATH"
            echo "✅ App installed on simulator"
          else
            echo "❌ App bundle not found at $APP_PATH"
            exit 1
          fi

          # Launch the app
          xcrun simctl launch "$SIM_UDID" cx.srd.xnuimagefuzzer
          echo "✅ App launched"

          # Give it time to initialize
          sleep 5

          # Verify it's still running (didn't crash on launch)
          if xcrun simctl get_app_container "$SIM_UDID" cx.srd.xnuimagefuzzer 2>/dev/null; then
            echo "✅ App is installed and responsive"
          else
            echo "⚠️  Could not verify app container"
          fi

          # Terminate gracefully
          xcrun simctl terminate "$SIM_UDID" cx.srd.xnuimagefuzzer 2>/dev/null || true
          xcrun simctl shutdown "$SIM_UDID" 2>/dev/null || true
          echo "✅ Smoke test complete"

      - name: Check simulator crash logs
        if: always()
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          CRASH_DIR=~/Library/Logs/DiagnosticReports
          if [ -d "$CRASH_DIR" ]; then
            crashes=$(find "$CRASH_DIR" -name "*XNU*Image*Fuzzer*" -mmin -5 2>/dev/null || true)
            if [ -n "$crashes" ]; then
              echo "❌ Crash logs detected:"
              echo "$crashes" | while read -r f; do
                echo "--- $(sanitize_line "$(basename "$f")") ---"
                head -30 "$f"
              done
              exit 1
            fi
          fi
          echo "✅ No crash logs found"
