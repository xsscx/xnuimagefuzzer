###############################################################
#
# Intent: xnuimagefuzzer-codeql-analysis
#
# Run CodeQL security analysis on the Objective-C fuzzer code.
#
# Architecture: Uses Homebrew LLVM clang for build tracing.
# macOS 15 SIP strips DYLD_INSERT_LIBRARIES from ALL hardened
# Mach-O binaries (system clang, xcodebuild), breaking CodeQL's
# compiler interception. Homebrew LLVM is NOT SIP-hardened, so
# CodeQL's DYLD tracing works with it.
# Upstream issue: github/codeql-action#2506
#
# Note: CodeQL C/C++ extractor does NOT support .m files in
# build-mode: none (standalone extraction only finds .c/.cpp).
# We must use build-mode: manual with an actual compile step.
#
###############################################################

name: xnuimagefuzzer-codeql-analysis

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - 'codeql-queries/**'
      - 'codeql-config.yml'
      - '.github/workflows/codeql-analysis.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - 'codeql-queries/**'
      - 'codeql-config.yml'
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

env:
  BASH_ENV: /dev/null

defaults:
  run:
    shell: bash --noprofile --norc {0}

jobs:
  analyze:
    name: CodeQL Analysis (Objective-C)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Install Homebrew LLVM (non-SIP-hardened clang)
        run: |
          set -euo pipefail
          # Homebrew LLVM is not SIP-hardened — CodeQL DYLD tracing works with it
          brew install llvm 2>&1 | tail -5
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LLVM_PREFIX=${LLVM_PREFIX}" >> "$GITHUB_ENV"
          echo "Homebrew clang: ${LLVM_PREFIX}/bin/clang"
          "${LLVM_PREFIX}/bin/clang" --version | sed -n '1p'

      - name: Resolve CodeQL query pack dependencies
        run: |
          set -euo pipefail
          cd codeql-queries
          codeql pack install 2>&1 || echo "⚠️ codeql pack install failed — will try without"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          build-mode: manual
          queries: +security-extended,./codeql-queries

      - name: Build with non-SIP-hardened clang
        run: |
          set -euo pipefail
          SYSROOT="$(xcrun --show-sdk-path)"
          CLANG="${LLVM_PREFIX}/bin/clang"
          echo "=== Build Configuration ==="
          echo "Clang:   ${CLANG}"
          echo "Sysroot: ${SYSROOT}"

          # Compile each Objective-C source file
          # CodeQL intercepts compiler invocations via DYLD_INSERT_LIBRARIES
          # which works with Homebrew clang (not SIP-hardened)
          compiled=0
          for src in "XNU Image Fuzzer"/*.m; do
            [ -f "$src" ] || continue
            base="$(basename "$src" .m)"
            echo "Compiling: $src"
            "$CLANG" -c -x objective-c \
              -isysroot "$SYSROOT" \
              -fmodules \
              -target arm64-apple-macos14.0 \
              -Wno-everything \
              "$src" -o "/tmp/${base}.o"
            compiled=$((compiled + 1))
          done
          echo "=== Compiled ${compiled} source files ==="
          if [ "$compiled" -eq 0 ]; then
            echo "::error::No source files compiled"
            exit 1
          fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: objc-security
          output: codeql-results
          upload: always

      - name: Generate SARIF summary
        if: always()
        run: |
          set -euo pipefail
          echo "=== CodeQL Analysis Results ==="
          if [ -d codeql-results ]; then
            for sarif in codeql-results/*.sarif; do
              [ -f "$sarif" ] || continue
              echo "--- $(basename "$sarif") ---"
              python3 -c "
          import json, sys
          with open('$sarif') as f:
              data = json.load(f)
          for run in data.get('runs', []):
              results = run.get('results', [])
              print(f'Total findings: {len(results)}')
              for r in results[:30]:
                  rule = r.get('ruleId', 'unknown')
                  msg = r.get('message', {}).get('text', '')[:120]
                  level = r.get('level', 'note')
                  locs = r.get('locations', [{}])
                  loc = locs[0].get('physicalLocation', {}) if locs else {}
                  fpath = loc.get('artifactLocation', {}).get('uri', '?')
                  line = loc.get('region', {}).get('startLine', '?')
                  print(f'  [{level}] {rule}: {fpath}:{line} — {msg}')
              if len(results) > 30:
                  print(f'  ... and {len(results) - 30} more findings')
          " 2>&1 || echo "Could not parse SARIF"
            done
          else
            echo "No SARIF output directory found"
          fi

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codeql-sarif-results
          path: codeql-results/
          retention-days: 30
          if-no-files-found: warn
