###############################################################
#
# Intent: xnuimagefuzzer-codeql-analysis
#
# Run CodeQL security analysis on the Objective-C fuzzer code.
#
# Architecture: Uses build-mode: none to analyze source directly
# without compilation tracing. macOS 15 SIP strips DYLD_INSERT_LIBRARIES
# from ALL hardened binaries (clang, xcodebuild), making build tracing
# impossible. build-mode: none creates the CodeQL database directly
# from source files. Upstream: github/codeql-action#2506
#
###############################################################

name: xnuimagefuzzer-codeql-analysis

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - 'codeql-queries/**'
      - 'codeql-config.yml'
      - '.github/workflows/codeql-analysis.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - 'codeql-queries/**'
      - 'codeql-config.yml'
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

env:
  BASH_ENV: /dev/null

defaults:
  run:
    shell: bash --noprofile --norc {0}

jobs:
  analyze:
    name: CodeQL Analysis (Objective-C)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Resolve CodeQL query pack dependencies
        run: |
          set -euo pipefail
          cd codeql-queries
          codeql pack install 2>&1 || echo "⚠️ codeql pack install failed — will try without"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: none
          queries: +security-extended,./codeql-queries

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: objc-security
          output: codeql-results
          upload: always

      - name: Generate SARIF summary
        if: always()
        run: |
          set -euo pipefail
          echo "=== CodeQL Analysis Results ==="
          if [ -d codeql-results ]; then
            for sarif in codeql-results/*.sarif; do
              [ -f "$sarif" ] || continue
              echo "--- $(basename "$sarif") ---"
              python3 -c "
          import json, sys
          with open('$sarif') as f:
              data = json.load(f)
          for run in data.get('runs', []):
              results = run.get('results', [])
              print(f'Total findings: {len(results)}')
              for r in results[:30]:
                  rule = r.get('ruleId', 'unknown')
                  msg = r.get('message', {}).get('text', '')[:120]
                  level = r.get('level', 'note')
                  locs = r.get('locations', [{}])
                  loc = locs[0].get('physicalLocation', {}) if locs else {}
                  fpath = loc.get('artifactLocation', {}).get('uri', '?')
                  line = loc.get('region', {}).get('startLine', '?')
                  print(f'  [{level}] {rule}: {fpath}:{line} — {msg}')
              if len(results) > 30:
                  print(f'  ... and {len(results) - 30} more findings')
          " 2>&1 || echo "Could not parse SARIF"
            done
          else
            echo "No SARIF output directory found"
          fi

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codeql-sarif-results
          path: codeql-results/
          retention-days: 30
          if-no-files-found: warn
