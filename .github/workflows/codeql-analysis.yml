###############################################################
#
# Intent: xnuimagefuzzer-codeql-analysis
#
# Run CodeQL security analysis on the Objective-C fuzzer code.
#
# Architecture: Uses macos-14 (Sonoma) where CodeQL DYLD tracing
# works with xcodebuild. macOS 15 (Sequoia) SIP strips
# DYLD_INSERT_LIBRARIES from ALL hardened Mach-O binaries
# (system clang, xcodebuild), breaking CodeQL's compiler
# interception. macos-14 does not have this restriction.
# Upstream issue: github/codeql-action#2506
#
# Approaches tried and failed on macOS 15:
# 1. xcodebuild with build tracing — SIP strips DYLD
# 2. Direct system clang — also SIP-hardened
# 3. build-mode: none — extractor ignores .m files
# 4. Homebrew LLVM clang — DYLD still stripped by SIP shell
#
###############################################################

name: xnuimagefuzzer-codeql-analysis

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - 'codeql-queries/**'
      - 'codeql-config.yml'
      - '.github/workflows/codeql-analysis.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - 'codeql-queries/**'
      - 'codeql-config.yml'
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

env:
  BASH_ENV: /dev/null

defaults:
  run:
    shell: bash --noprofile --norc {0}

jobs:
  analyze:
    name: CodeQL Analysis (Objective-C)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Select Xcode
        run: |
          set -euo pipefail
          # Use latest available Xcode on macos-14
          XCODE_PATH="$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode installation found"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          echo "Selected: $XCODE_PATH"
          xcodebuild -version 2>&1 | sed -n '1,2p'
          # List available iOS Simulator destinations
          xcrun simctl list devices available iPhone 2>&1 | grep -m3 "iPhone" || true

      - name: Resolve CodeQL query pack dependencies
        run: |
          set -euo pipefail
          cd codeql-queries
          codeql pack install 2>&1 || echo "⚠️ codeql pack install failed — will try without"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          build-mode: manual
          queries: +security-extended,./codeql-queries

      - name: Build with xcodebuild
        run: |
          set -euo pipefail
          # Find an available iOS Simulator device
          DEVICE_ID="$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if d.get('isAvailable') and 'iPhone' in d.get('name',''):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")"
          echo "Using simulator: ${DEVICE_ID}"

          # Build for iOS Simulator — CodeQL traces clang invocations
          # via DYLD_INSERT_LIBRARIES (works on macos-14, blocked on macos-15)
          xcodebuild build \
            -project "XNU Image Fuzzer.xcodeproj" \
            -scheme "XNU Image Fuzzer" \
            -destination "platform=iOS Simulator,id=${DEVICE_ID}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | sed -n '/error:/p; /warning:/p; /BUILD/p; $p'
          echo "Build completed with exit code: $?"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: objc-security
          output: codeql-results
          upload: always

      - name: Generate SARIF summary
        if: always()
        run: |
          set -euo pipefail
          echo "=== CodeQL Analysis Results ==="
          if [ -d codeql-results ]; then
            for sarif in codeql-results/*.sarif; do
              [ -f "$sarif" ] || continue
              echo "--- $(basename "$sarif") ---"
              python3 -c "
          import json, sys
          with open('$sarif') as f:
              data = json.load(f)
          for run in data.get('runs', []):
              results = run.get('results', [])
              print(f'Total findings: {len(results)}')
              for r in results[:30]:
                  rule = r.get('ruleId', 'unknown')
                  msg = r.get('message', {}).get('text', '')[:120]
                  level = r.get('level', 'note')
                  locs = r.get('locations', [{}])
                  loc = locs[0].get('physicalLocation', {}) if locs else {}
                  fpath = loc.get('artifactLocation', {}).get('uri', '?')
                  line = loc.get('region', {}).get('startLine', '?')
                  print(f'  [{level}] {rule}: {fpath}:{line} — {msg}')
              if len(results) > 30:
                  print(f'  ... and {len(results) - 30} more findings')
          " 2>&1 || echo "Could not parse SARIF"
            done
          else
            echo "No SARIF output directory found"
          fi

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codeql-sarif-results
          path: codeql-results/
          retention-days: 30
          if-no-files-found: warn
