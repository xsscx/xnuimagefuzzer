###############################################################
#
# Intent: xnuimagefuzzer-codeql-analysis
#
# Run CodeQL security analysis on the Objective-C fuzzer code.
#
# Architecture: Uses direct clang invocation instead of xcodebuild
# because macOS 15 + Xcode 16 SIP strips DYLD_INSERT_LIBRARIES from
# xcodebuild sandboxed child processes, breaking CodeQL C/C++ tracing.
# Upstream: https://github.com/github/codeql-action/issues/2506
#
# Direct clang compilation bypasses SIP sandbox restrictions entirely.
# CodeQL traces clang process directly — no DYLD injection needed.
#
###############################################################

name: xnuimagefuzzer-codeql-analysis

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - 'codeql-queries/**'
      - 'codeql-config.yml'
      - '.github/workflows/codeql-analysis.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - 'codeql-queries/**'
      - 'codeql-config.yml'
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

env:
  BASH_ENV: /dev/null

defaults:
  run:
    shell: bash --noprofile --norc {0}

jobs:
  analyze:
    name: CodeQL Analysis (Objective-C)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Resolve CodeQL query pack dependencies
        run: |
          set -euo pipefail
          cd codeql-queries
          codeql pack install 2>&1 || echo "⚠️ codeql pack install failed — will try without"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: +security-extended,./codeql-queries

      - name: Build with direct clang (bypasses SIP/xcodebuild tracing issue)
        run: |
          set -euo pipefail

          # Use iOS Simulator SDK for framework headers
          SDK_PATH="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          echo "SDK: ${SDK_PATH}"

          # Compile each .m file with direct clang invocation
          # CodeQL traces clang directly — no DYLD_INSERT_LIBRARIES needed
          for src in "XNU Image Fuzzer"/*.m; do
            echo "Compiling: ${src}"
            clang -c -fobjc-arc -x objective-c \
              -isysroot "${SDK_PATH}" \
              -target arm64-apple-ios17.0-simulator \
              -fmodules \
              -I "XNU Image Fuzzer" \
              -Wno-everything \
              -o "/tmp/$(basename "${src}" .m).o" \
              "${src}"
          done
          echo "✅ Direct clang build completed — CodeQL tracing active"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: objc-security
          output: codeql-results
          upload: always

      - name: Generate SARIF summary
        if: always()
        run: |
          set -euo pipefail
          echo "=== CodeQL Analysis Results ==="
          if [ -d codeql-results ]; then
            for sarif in codeql-results/*.sarif; do
              [ -f "$sarif" ] || continue
              echo "--- $(basename "$sarif") ---"
              python3 -c "
          import json, sys
          with open('$sarif') as f:
              data = json.load(f)
          for run in data.get('runs', []):
              results = run.get('results', [])
              print(f'Total findings: {len(results)}')
              for r in results[:30]:
                  rule = r.get('ruleId', 'unknown')
                  msg = r.get('message', {}).get('text', '')[:120]
                  level = r.get('level', 'note')
                  locs = r.get('locations', [{}])
                  loc = locs[0].get('physicalLocation', {}) if locs else {}
                  fpath = loc.get('artifactLocation', {}).get('uri', '?')
                  line = loc.get('region', {}).get('startLine', '?')
                  print(f'  [{level}] {rule}: {fpath}:{line} — {msg}')
              if len(results) > 30:
                  print(f'  ... and {len(results) - 30} more findings')
          " 2>&1 || echo "Could not parse SARIF"
            done
          else
            echo "No SARIF output directory found"
          fi

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codeql-sarif-results
          path: codeql-results/
          retention-days: 30
          if-no-files-found: warn
