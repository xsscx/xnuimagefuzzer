###############################################################
#
# Intent: xnuimagefuzzer-code-quality
#
# Security hardening modeled on iccDEV/.github/workflows/:
#   - Pinned action SHAs (immutable, auditable)
#   - Explicit least-privilege permissions
#   - Credential hardening (unset GITHUB_TOKEN, empty credential.helper)
#   - BASH_ENV=/dev/null to prevent .bashrc injection
#   - Hardened shell: bash --noprofile --norc
#   - Concurrency control with cancel-in-progress
#   - persist-credentials: false on checkout
#   - Input sanitization via .github/scripts/sanitize-sed.sh
#   - No user-controllable inputs in run: blocks
#
###############################################################

name: xnuimagefuzzer-code-quality

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

env:
  BASH_ENV: /dev/null

defaults:
  run:
    shell: bash --noprofile --norc {0}

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - '**/*.py'
      - '.github/scripts/**'
      - 'XNU Image Fuzzer/CMakeLists.txt'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.m'
      - '**/*.h'
      - '**/*.py'
      - '.github/scripts/**'
      - 'XNU Image Fuzzer/CMakeLists.txt'
  workflow_dispatch:

jobs:
  objc-syntax:
    name: Objective-C Syntax Check
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Check for duplicate defines
        run: |
          set -euo pipefail
          echo "=== Checking for duplicate #define macros ==="
          echo "INFO: compiler-level check via -Werror=macro-redefined in syntax check steps"
          echo "OK: preprocessor-aware duplicate detection delegated to clang"

      - name: Compile Objective-C syntax check (xnuimagefuzzer.m)
        run: |
          set -euo pipefail
          clang -fsyntax-only -x objective-c \
            -fobjc-arc \
            -isysroot "$(xcrun --sdk iphoneos --show-sdk-path)" \
            -target arm64-apple-ios14.2 \
            -fmodules \
            -Werror=incompatible-pointer-types \
            -Werror=macro-redefined \
            -I"XNU Image Fuzzer" \
            "XNU Image Fuzzer/xnuimagefuzzer.m"
          echo "OK: xnuimagefuzzer.m syntax OK"

      - name: Compile Objective-C syntax check (ViewController.m)
        run: |
          set -euo pipefail
          clang -fsyntax-only -x objective-c \
            -fobjc-arc \
            -isysroot "$(xcrun --sdk iphoneos --show-sdk-path)" \
            -target arm64-apple-ios14.2 \
            -fmodules \
            -Werror=incompatible-pointer-types \
            -I"XNU Image Fuzzer" \
            "XNU Image Fuzzer/ViewController.m"
          echo "OK: ViewController.m syntax OK"

      - name: Compile Objective-C syntax check (AppDelegate.m)
        run: |
          set -euo pipefail
          clang -fsyntax-only -x objective-c \
            -fobjc-arc \
            -isysroot "$(xcrun --sdk iphoneos --show-sdk-path)" \
            -target arm64-apple-ios14.2 \
            -fmodules \
            -I"XNU Image Fuzzer" \
            "XNU Image Fuzzer/AppDelegate.m"
          echo "OK: AppDelegate.m syntax OK"

      - name: Compile Objective-C syntax check (SceneDelegate.m)
        run: |
          set -euo pipefail
          clang -fsyntax-only -x objective-c \
            -fobjc-arc \
            -isysroot "$(xcrun --sdk iphoneos --show-sdk-path)" \
            -target arm64-apple-ios14.2 \
            -fmodules \
            -I"XNU Image Fuzzer" \
            "XNU Image Fuzzer/SceneDelegate.m"
          echo "OK: SceneDelegate.m syntax OK"

      - name: Verify UIImageView reuse pattern
        run: |
          set -euo pipefail
          if grep -q 'viewWithTag:100' "XNU Image Fuzzer/ViewController.m"; then
            echo "OK: UIImageView reuse pattern found (viewWithTag:100)"
          else
            echo "ERROR: UIImageView reuse pattern missing - cells may leak subviews"
            exit 1
          fi

      - name: Verify const correctness for injectStrings
        run: |
          set -euo pipefail
          if grep -q 'const char\* injectStrings' "XNU Image Fuzzer/xnuimagefuzzer.m"; then
            echo "OK: injectStrings uses const char*"
          else
            echo "ERROR: injectStrings should use const char*"
            exit 1
          fi

  python-lint:
    name: Python Lint & Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install lint tools
        run: |
          set -euo pipefail
          pip install --quiet pyflakes

      - name: Python syntax check
        run: |
          set -euo pipefail
          source .github/scripts/sanitize-sed.sh
          echo "=== Checking Python syntax ==="
          errors=0
          while IFS= read -r -d '' f; do
            if python3 -m py_compile "$f" 2>&1; then
              echo "OK: $(sanitize_line "$f") syntax OK"
            else
              echo "ERROR: $(sanitize_line "$f") has syntax errors"
              errors=1
            fi
          done < <(find . -name '*.py' -not -path './.git/*' -print0 | sort -z)
          if [ "$errors" -eq 1 ]; then
            exit 1
          fi

      - name: Pyflakes static analysis
        run: |
          set -euo pipefail
          find . -name '*.py' -not -path './.git/*' -print0 | sort -z | xargs -0 pyflakes

      - name: Python unit tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Shell script syntax check
        run: |
          set -euo pipefail
          find .github/scripts -name '*.sh' -print0 | sort -z | xargs -0 -n1 bash -n

      - name: Check for duplicate dict keys
        run: |
          set -euo pipefail
          echo "=== Checking for duplicate dict keys in read-magic-numbers.py ==="
          python3 -c "
          import ast, sys
          with open('read-magic-numbers.py') as f:
              tree = ast.parse(f.read())
          for node in ast.walk(tree):
              if isinstance(node, ast.Dict):
                  keys = []
                  for k in node.keys:
                      if k is not None:
                          key_repr = ast.dump(k)
                          if key_repr in keys:
                              print(f'Duplicate dict key at line {k.lineno}')
                              sys.exit(1)
                          keys.append(key_repr)
          print('No duplicate dict keys found')
          "

      - name: Verify logging format string
        run: |
          set -euo pipefail
          if grep -P "levelname.*levelname" read-magic-numbers.py; then
            echo "ERROR: Duplicate levelname in logging format"
            exit 1
          else
            echo "OK: Logging format OK"
          fi

  cmake-check:
    name: CMakeLists.txt Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Credential hardening
        run: |
          set -euo pipefail
          git config --global credential.helper ""
          unset GITHUB_TOKEN || true

      - name: Verify source file reference
        run: |
          set -euo pipefail
          echo "=== Checking CMakeLists.txt source file reference ==="
          if grep -q 'add_executable(xnuimagefuzzer xnuimagefuzzer.m)' "XNU Image Fuzzer/CMakeLists.txt"; then
            echo "OK: CMakeLists.txt references correct source file (xnuimagefuzzer.m)"
          else
            echo "ERROR: CMakeLists.txt references wrong source file"
            grep 'add_executable' "XNU Image Fuzzer/CMakeLists.txt"
            exit 1
          fi

      - name: CMake syntax check
        run: |
          set -euo pipefail
          echo "=== Checking CMake syntax ==="
          cd "XNU Image Fuzzer"
          cmake -P CMakeLists.txt 2>&1 || true
          echo "OK: CMakeLists.txt parsed without fatal errors"
